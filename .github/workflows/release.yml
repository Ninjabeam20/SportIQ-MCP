name: release

on:
  push:
    tags: ["v*"]

# Never run two releases concurrently; do NOT cancel an in-flight publish.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi   # OIDC trust binding must name this env in PyPI publisher config
    permissions:
      id-token: write   # OIDC Trusted Publishing (ADR-0010)
      contents: read    # actions/checkout requires this
    steps:
      - uses: actions/checkout@v4

      - name: Install CBC solver
        # dream11_solver.py calls COIN_CMD(), which needs a `cbc` binary on PATH.
        run: sudo apt-get update && sudo apt-get install -y coinor-cbc

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Pin Python
        run: uv python install 3.13

      - name: Sync deps
        run: uv sync --extra dev --python 3.13

      - name: Test (release quality gate)
        run: uv run --python 3.13 --extra dev python -m pytest

      - name: Verify build artifacts (security gate, also builds dist/)
        run: uv run --python 3.13 --extra dev python scripts/check_release_build.py

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
