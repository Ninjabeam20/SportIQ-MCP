name: security

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Sync deps
        run: uv sync --extra dev
      - name: Audit dependencies for known CVEs
        # --skip-editable: skip local package (not on PyPI yet); --strict cannot
        # coexist with --skip-editable (strict fails on any skip). Fail-closed
        # for all other transitive deps still applies via non-zero exit on any CVE.
        # CVE-2025-69872: diskcache pickle RCE — acceptable risk (local-only cache).
        # GHSA-6v7p-g79w-8964: msgpack — fix is 1.2.1 but signalrcore (fastf1's
        # live-timing client, optional f1 extra) pins msgpack below it; msgpack is
        # not on the hosted server path. Drop the ignore when signalrcore unpins.
        run: uv run pip-audit --skip-editable --ignore-vuln CVE-2025-69872 --ignore-vuln GHSA-6v7p-g79w-8964

  bandit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Sync deps
        run: uv sync --extra dev
      - name: Static security analysis
        run: uv run bandit -r src -ll --quiet

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for committed secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Sync deps
        run: uv sync --extra dev
      - name: Verify build artifacts exclude sensitive paths
        run: uv run python scripts/check_release_build.py
