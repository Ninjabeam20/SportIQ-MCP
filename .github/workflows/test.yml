name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install CBC solver
        # dream11_solver.py calls COIN_CMD(), which needs a `cbc` binary on PATH.
        run: sudo apt-get update && sudo apt-get install -y coinor-cbc

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Pin Python
        run: uv python install ${{ matrix.python-version }}

      - name: Sync deps
        run: uv sync --extra dev --python ${{ matrix.python-version }}

      - name: Lint
        run: uv run --python ${{ matrix.python-version }} --extra dev ruff check .

      - name: Test
        run: uv run --python ${{ matrix.python-version }} --extra dev pytest --cov=sportiq --cov-report=term-missing --cov-fail-under=84
