<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>sportiq-mcp · analytics</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"
        integrity="sha384-9nhczxUqK87bcKHh20fSQcTGD4qq5GhayNYSYWqwBkINBhOfQLg/P5HG5lF1urn4"
        crossorigin="anonymous"></script>
<style>
  :root { --bg:#0d1117; --panel:#161b22; --line:#30363d; --fg:#e6edf3; --muted:#8b949e; --accent:#58a6ff; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--fg); font:14px/1.5 -apple-system,Segoe UI,Roboto,sans-serif; padding:24px; }
  h1 { font-size:20px; margin:0 0 4px; }
  .sub { color:var(--muted); margin:0 0 20px; }
  .tiles { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; margin-bottom:24px; }
  .tile { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:16px; }
  .tile .n { font-size:28px; font-weight:600; }
  .tile .l { color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.05em; }
  .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(380px,1fr)); gap:16px; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:16px; }
  .card h2 { font-size:14px; margin:0 0 12px; color:var(--fg); }
  .badge { font-size:11px; padding:2px 6px; border-radius:4px; margin-left:8px; vertical-align:middle; }
  .badge.cached { background:#3d2e00; color:#e3b341; }
  .badge.error { background:#3d1418; color:#f85149; }
  .badge.live { background:#0d2818; color:#3fb950; }
  .note { color:var(--muted); font-size:12px; margin-top:8px; }
  canvas { max-height:260px; }
  table.matrix { border-collapse:collapse; font-size:12px; width:100%; }
  table.matrix th, table.matrix td { border:1px solid var(--line); padding:4px 8px; text-align:right; }
  table.matrix th { color:var(--muted); font-weight:500; }
  table.matrix th:first-child, table.matrix td:first-child { text-align:left; color:var(--fg); }
  table.matrix td.z { color:#30363d; }
</style>
</head>
<body>
  <h1>sportiq-mcp · analytics</h1>
  <p class="sub">Aggregate usage · generated __GENERATED__ · all metrics anonymous by design (no per-user identity)</p>

  <div class="tiles" id="tiles"></div>
  <div class="grid" id="grid"></div>

<script>
const DATA = __DATA__;

function badge(src){
  if (src._error) return `<span class="badge error">error</span>`;
  if (src._from_cache) return `<span class="badge cached">cached</span>`;
  return `<span class="badge live">live</span>`;
}
function card(title, src){
  const c = document.createElement('div');
  c.className = 'card';
  c.innerHTML = `<h2>${title}${badge(src)}</h2>`;
  if (src._error) { const n = document.createElement('div'); n.className = 'note'; n.textContent = src._error; c.appendChild(n); }
  document.getElementById('grid').appendChild(c);
  return c;
}
function tile(n, label){
  const t = document.createElement('div');
  t.className = 'tile';
  t.innerHTML = `<div class="n">${n}</div><div class="l">${label}</div>`;
  document.getElementById('tiles').appendChild(t);
}

// --- Tiles -------------------------------------------------------------
const cr = DATA.cloud_run, gh = DATA.github, pp = DATA.pypi, ai = DATA.ai_clients, ts = DATA.tool_stats || {}, sp = DATA.sponsors || {};
const nfmt = n => (n ?? 0).toLocaleString?.() ?? (n ?? '—');
tile(nfmt(sp.count), 'sponsors');
tile('$' + nfmt(sp.mrr_usd), 'recurring / mo');
tile((cr.total_requests ?? '—').toLocaleString?.() ?? cr.total_requests ?? '—', 'requests (30d)');
tile(nfmt(ts.total_ok), 'tool calls ok (30d)');
tile(nfmt(ts.total_error), 'tool calls failed (30d)');
tile(gh.stars ?? '—', 'github stars');
tile((pp.total ?? '—').toLocaleString?.() ?? pp.total ?? '—', 'pypi installs (30d)');

// --- Cloud Run: requests/day stacked by status class -------------------
{
  const c = card('Cloud Run requests / day', cr);
  const days = cr.days || [];
  const classes = ['2xx','3xx','4xx','5xx'];
  const colors = {'2xx':'#3fb950','3xx':'#58a6ff','4xx':'#e3b341','5xx':'#f85149'};
  const cv = document.createElement('canvas'); c.appendChild(cv);
  new Chart(cv, { type:'bar', data:{ labels:days,
    datasets: classes.map(k => ({ label:k,
      data: days.map(d => (cr.counts_by_day?.[d]?.[k]) || 0),
      backgroundColor: colors[k] })) },
    options:{ responsive:true, scales:{ x:{stacked:true}, y:{stacked:true} },
      plugins:{ legend:{ labels:{ color:'#8b949e' } } } } });
}

// --- Cloud Run: latency p50/p99 ----------------------------------------
{
  const c = card('Latency (ms) · p50 / p99', cr);
  const days = cr.days || [];
  const cv = document.createElement('canvas'); c.appendChild(cv);
  new Chart(cv, { type:'line', data:{ labels:days, datasets:[
    { label:'p50', data: days.map(d => cr.p50?.[d] ?? null), borderColor:'#58a6ff', tension:.3 },
    { label:'p99', data: days.map(d => cr.p99?.[d] ?? null), borderColor:'#f85149', tension:.3 } ]},
    options:{ responsive:true, plugins:{ legend:{ labels:{ color:'#8b949e' } } } } });
}

// --- Tool analytics (from `tool_call` structured logs) -----------------
const palette = ['#58a6ff','#3fb950','#e3b341','#f85149','#bc8cff','#8b949e','#ff7b72','#7ee787','#79c0ff','#d2a8ff'];
const toolsArr = ts.tools || [];
const noToolData = !toolsArr.length && !(ts.success_over_time?.days || []).length;

// Success vs failed tool calls per day (the real success signal — MCP errors are HTTP 200).
{
  const c = card('Tool calls / day · ok vs failed', ts);
  const sot = ts.success_over_time || {days:[],ok:[],error:[]};
  if (sot.days.length) {
    const cv = document.createElement('canvas'); c.appendChild(cv);
    new Chart(cv, { type:'bar', data:{ labels:sot.days, datasets:[
      { label:'ok', data:sot.ok, backgroundColor:'#3fb950' },
      { label:'failed', data:sot.error, backgroundColor:'#f85149' } ]},
      options:{ responsive:true, scales:{ x:{stacked:true}, y:{stacked:true} },
        plugins:{ legend:{ labels:{ color:'#8b949e' } } } } });
  } else { c.innerHTML += `<div class="note">No tool_call events in window (deploy the tool-telemetry build, or GCP auth missing).</div>`; }
}

// Calls by tool (busiest tools).
{
  const c = card('Calls by tool', ts);
  const rows = toolsArr.slice(0, 15);
  if (rows.length) {
    const cv = document.createElement('canvas'); c.appendChild(cv);
    new Chart(cv, { type:'bar', data:{ labels:rows.map(r=>r.tool),
      datasets:[{ label:'calls', data:rows.map(r=>r.calls), backgroundColor:'#58a6ff' }] },
      options:{ indexAxis:'y', responsive:true, plugins:{ legend:{ display:false } },
        scales:{ x:{ ticks:{ color:'#8b949e' } }, y:{ ticks:{ color:'#8b949e' } } } } });
  } else if (!noToolData) { c.innerHTML += `<div class="note">No calls yet.</div>`; }
}

// Top failing tools — error rate (only tools that erred), labelled with counts.
{
  const c = card('Error rate by tool (top failing)', ts);
  const rows = toolsArr.filter(r=>r.errors>0).sort((a,b)=>b.error_rate-a.error_rate).slice(0,15);
  if (rows.length) {
    const cv = document.createElement('canvas'); c.appendChild(cv);
    new Chart(cv, { type:'bar', data:{ labels:rows.map(r=>`${r.tool} (${r.errors}/${r.calls})`),
      datasets:[{ label:'error rate', data:rows.map(r=>+(r.error_rate*100).toFixed(1)), backgroundColor:'#f85149' }] },
      options:{ indexAxis:'y', responsive:true, plugins:{ legend:{ display:false },
        tooltip:{ callbacks:{ label:ctx=>`${ctx.parsed.x}%` } } },
        scales:{ x:{ ticks:{ color:'#8b949e', callback:v=>v+'%' } }, y:{ ticks:{ color:'#8b949e' } } } } });
  } else if (!noToolData) { c.innerHTML += `<div class="note">No tool failures in window. 🎉</div>`; }
  const ecs = Object.entries(ts.error_codes || {}).sort((a,b)=>b[1]-a[1]);
  if (ecs.length) c.innerHTML += `<div class="note" style="margin-top:10px">By code — ${ecs.map(([k,v])=>`${k}: ${v}`).join(' · ')}</div>`;
}

// Latency by tool — avg + p99, sorted by p99 (top expensive tools).
{
  const c = card('Latency by tool · avg / p99 (ms)', ts);
  const rows = [...toolsArr].sort((a,b)=>b.p99_ms-a.p99_ms).slice(0,15);
  if (rows.length) {
    const cv = document.createElement('canvas'); c.appendChild(cv);
    new Chart(cv, { type:'bar', data:{ labels:rows.map(r=>r.tool), datasets:[
      { label:'avg', data:rows.map(r=>r.avg_ms), backgroundColor:'#58a6ff' },
      { label:'p99', data:rows.map(r=>r.p99_ms), backgroundColor:'#e3b341' } ]},
      options:{ indexAxis:'y', responsive:true, plugins:{ legend:{ labels:{ color:'#8b949e' } } },
        scales:{ x:{ ticks:{ color:'#8b949e' } }, y:{ ticks:{ color:'#8b949e' } } } } });
  } else if (!noToolData) { c.innerHTML += `<div class="note">No latency samples yet.</div>`; }
}

// Calls by client (load by AI client — the closest free answer to "which users").
{
  const c = card('Calls by client', ts);
  const b = ts.clients || {};
  const labels = Object.keys(b).sort((x,y)=>b[y]-b[x]), vals = labels.map(k=>b[k]);
  if (labels.length) {
    const cv = document.createElement('canvas'); c.appendChild(cv);
    new Chart(cv, { type:'doughnut', data:{ labels, datasets:[{ data:vals, backgroundColor:palette }] },
      options:{ responsive:true, plugins:{ legend:{ labels:{ color:'#8b949e' } } } } });
  } else if (!noToolData) { c.innerHTML += `<div class="note">No client attribution yet.</div>`; }
}

// Client × tool matrix — who calls what.
{
  const c = card('Client × tool (calls)', ts);
  const m = ts.matrix || {};
  const clients = Object.keys(m).sort((x,y)=>(ts.clients?.[y]||0)-(ts.clients?.[x]||0));
  const toolSet = {};
  clients.forEach(cl => Object.keys(m[cl]).forEach(t => toolSet[t]=(toolSet[t]||0)+m[cl][t]));
  const toolCols = Object.keys(toolSet).sort((x,y)=>toolSet[y]-toolSet[x]).slice(0,12);
  if (clients.length && toolCols.length) {
    let h = '<div style="overflow-x:auto"><table class="matrix"><thead><tr><th>client \\ tool</th>';
    h += toolCols.map(t=>`<th>${t}</th>`).join('') + '</tr></thead><tbody>';
    clients.forEach(cl => {
      h += `<tr><td>${cl}</td>` + toolCols.map(t=>{ const v=m[cl][t]||0; return `<td${v?'':' class="z"'}>${v||''}</td>`; }).join('') + '</tr>';
    });
    h += '</tbody></table></div>';
    const d = document.createElement('div'); d.innerHTML = h; c.appendChild(d);
  } else if (!noToolData) { c.innerHTML += `<div class="note">Not enough data for a matrix yet.</div>`; }
}

// --- AI clients pie (User-Agent heuristic) -----------------------------
{
  const c = card('AI client (User-Agent guess)', ai);
  const b = ai.buckets || {};
  const labels = Object.keys(b), vals = labels.map(k => b[k]);
  const cv = document.createElement('canvas'); c.appendChild(cv);
  if (labels.length) {
    new Chart(cv, { type:'doughnut', data:{ labels,
      datasets:[{ data:vals, backgroundColor:['#58a6ff','#3fb950','#e3b341','#f85149','#bc8cff','#8b949e','#ff7b72','#7ee787'] }] },
      options:{ responsive:true, plugins:{ legend:{ labels:{ color:'#8b949e' } } } } });
  } else {
    c.innerHTML += `<div class="note">No /mcp requests in window (or GCP auth missing).</div>`;
  }
  const aiNote = ai.source === 'client_info'
    ? 'From MCP clientInfo (clean client names reported by the client).'
    : 'Heuristic from User-Agent — deploy the client-info middleware for clean names; until then "other"/"python-httpx" may dominate.';
  c.innerHTML += `<div class="note">${aiNote}</div>`;
}

// --- PyPI downloads/day -------------------------------------------------
{
  const c = card('PyPI downloads / day', pp);
  const cv = document.createElement('canvas'); c.appendChild(cv);
  new Chart(cv, { type:'line', data:{ labels: pp.days || [],
    datasets:[{ label:'downloads', data: pp.downloads || [], borderColor:'#bc8cff', fill:true, backgroundColor:'rgba(188,140,255,.1)', tension:.3 }] },
    options:{ responsive:true, plugins:{ legend:{ labels:{ color:'#8b949e' } } } } });
}

// --- GitHub summary + traffic ------------------------------------------
{
  const c = card('GitHub', gh);
  c.innerHTML += `<div class="note">★ ${gh.stars ?? '—'} stars · ${gh.forks ?? '—'} forks · ${gh.open_issues ?? '—'} open issues · ${gh.watchers ?? '—'} watchers</div>`;

  if (gh.views && gh.views.days.length) {
    c.innerHTML += `<div class="note" style="margin-top:12px;margin-bottom:6px;color:var(--fg)">Views (14d) — ${gh.views.total} total · ${gh.views.unique} unique</div>`;
    const cv = document.createElement('canvas'); c.appendChild(cv);
    new Chart(cv, { type:'bar', data:{
      labels: gh.views.days,
      datasets:[
        { label:'views', data: gh.views.counts, backgroundColor:'rgba(88,166,255,0.5)', borderColor:'#58a6ff', borderWidth:1 },
        { label:'unique', data: gh.views.uniques_by_day, backgroundColor:'rgba(63,185,80,0.5)', borderColor:'#3fb950', borderWidth:1 }
      ]
    }, options:{ responsive:true, plugins:{ legend:{ labels:{ color:'#8b949e' } } }, scales:{ x:{ ticks:{ color:'#8b949e' } }, y:{ ticks:{ color:'#8b949e' } } } } });
  }

  if (gh.clones && gh.clones.days.length) {
    c.innerHTML += `<div class="note" style="margin-top:12px;margin-bottom:6px;color:var(--fg)">Clones (14d) — ${gh.clones.total} total · ${gh.clones.unique} unique</div>`;
    const cc = document.createElement('canvas'); c.appendChild(cc);
    new Chart(cc, { type:'bar', data:{
      labels: gh.clones.days,
      datasets:[
        { label:'clones', data: gh.clones.counts, backgroundColor:'rgba(210,153,34,0.5)', borderColor:'#e3b341', borderWidth:1 },
        { label:'unique', data: gh.clones.uniques_by_day, backgroundColor:'rgba(248,81,73,0.4)', borderColor:'#f85149', borderWidth:1 }
      ]
    }, options:{ responsive:true, plugins:{ legend:{ labels:{ color:'#8b949e' } } }, scales:{ x:{ ticks:{ color:'#8b949e' } }, y:{ ticks:{ color:'#8b949e' } } } } });
  }

  if (!gh.has_token) {
    c.innerHTML += `<div class="note">Daily views/clones omitted (no GITHUB_TOKEN). Add a repo-scoped token to enable.</div>`;
  }
}

// --- GitHub Sponsors: who / tier / recurring vs one-time ---------------
{
  const c = card('Sponsors', sp);
  if (!sp.has_token) {
    c.innerHTML += `<div class="note">No GITHUB_TOKEN set — add one with the sponsors / read:user scope to populate this panel.</div>`;
  } else {
    const inc = sp.est_monthly_income_usd ?? sp.mrr_usd ?? 0;
    c.innerHTML += `<div class="note">${nfmt(sp.count)} active · $${nfmt(sp.mrr_usd)}/mo recurring · ~$${nfmt(inc)}/mo est. income</div>`;
    const tc = sp.tier_counts || {};
    const tiers = Object.keys(tc);
    if (tiers.length) {
      c.innerHTML += `<div class="note" style="margin-top:10px;color:var(--fg)">By tier</div>`;
      const cv = document.createElement('canvas'); c.appendChild(cv);
      new Chart(cv, { type:'bar', data:{ labels:tiers,
        datasets:[{ label:'sponsors', data: tiers.map(t => tc[t]),
          backgroundColor:'#bc8cff' }] },
        options:{ responsive:true, plugins:{ legend:{ display:false } },
          scales:{ x:{ ticks:{ color:'#8b949e' } }, y:{ ticks:{ color:'#8b949e' }, beginAtZero:true } } } });
    }
    const rows = sp.sponsors || [];
    if (rows.length) {
      const esc = s => String(s ?? '').replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
      const trs = rows.map(s => `<tr>
        <td style="padding:4px 8px"><a href="https://github.com/${esc(s.login)}" style="color:var(--accent);text-decoration:none">${esc(s.name)}</a></td>
        <td style="padding:4px 8px">${esc(s.tier)}</td>
        <td style="padding:4px 8px;text-align:right">$${nfmt(s.price_usd)}</td>
        <td style="padding:4px 8px">${s.one_time ? 'one-time' : 'monthly'}</td>
        <td style="padding:4px 8px;color:var(--muted)">${esc(s.since)}</td>
      </tr>`).join('');
      c.innerHTML += `<table style="width:100%;border-collapse:collapse;font-size:12px;margin-top:12px">
        <thead><tr style="color:var(--muted);text-align:left">
          <th style="padding:4px 8px">Sponsor</th><th style="padding:4px 8px">Tier</th>
          <th style="padding:4px 8px;text-align:right">$/mo</th><th style="padding:4px 8px">Billing</th>
          <th style="padding:4px 8px">Since</th>
        </tr></thead><tbody>${trs}</tbody></table>`;
    } else {
      c.innerHTML += `<div class="note" style="margin-top:10px">No active sponsors yet.</div>`;
    }
    c.innerHTML += `<div class="note" style="margin-top:12px">Per-sponsor tool usage isn't available — all sponsors share the Tier-0 key, so calls can't be attributed to a person (see the Tools panels for aggregate usage). Needs V2b per-user keys.</div>`;
  }
}
</script>
</body>
</html>
